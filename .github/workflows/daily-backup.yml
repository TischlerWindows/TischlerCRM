name: Daily Database Backup

on:
  schedule:
    # Run every day at 7:00 AM UTC (2:00 AM EST / 3:00 AM EDT)
    - cron: '0 7 * * *'
  workflow_dispatch: # Allow manual trigger from GitHub Actions UI

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger scheduled backup
        run: |
          response=$(curl -s -w "\n%{http_code}" -X POST \
            "https://api-production-e4e8.up.railway.app/admin/backup/scheduled" \
            -H "X-Cron-Secret: ${{ secrets.BACKUP_CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            -d '{}')

          http_code=$(echo "$response" | tail -1)
          body=$(echo "$response" | head -n -1)

          echo "HTTP Status: $http_code"
          echo "Response: $body"

          if [ "$http_code" != "200" ]; then
            echo "::error::Backup failed with HTTP $http_code"
            exit 1
          fi

          echo "✅ Backup completed successfully"
